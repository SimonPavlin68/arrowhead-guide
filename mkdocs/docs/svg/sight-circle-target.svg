<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 20001102//EN" "http://www.w3.org/TR/2000/CR-SVG-20001102/DTD/svg-20001102.dtd">
<svg width="600" height="670" viewBox="100 0 550 670"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
	 style="background:#f8f8f8">

  <title>Arrowhead</title>
  <style>
    .merek { cursor: pointer; }
  </style>

  <defs>
	<pattern id="screwPattern" patternUnits="userSpaceOnUse" width="10" height="10">
      <line x1="0" y1="10" x2="10" y2="0" stroke="red" stroke-width="3" />
    </pattern>
    <mask id="mask" x="0" y="0" width="30" height="30">
      <rect width="99" height="99" fill="#fff"/>
      <circle cx="50" cy="50" r="40" />
    </mask>
    <g id="target" stroke-width="0.5" fill="none">
      <circle r="100" stroke="black" fill="black" stroke-width="0.5px" />
      <circle r="80" stroke="white" stroke-width="0.5px" />
      <circle r="60" stroke="white" stroke-width="0.5px" />
      <circle r="40" stroke="white" stroke-width="0.5px" />
      <circle r="20" stroke="black" fill="yellow" />
      <circle r="10" stroke="black" fill="none" stroke-width="0.5px" />
      <line x1="-4" y1="0" x2="4" y2="0" stroke="black" stroke-width="0.5px" />
      <line x1="0" y1="-4" x2="0" y2="4" stroke="black" stroke-width="0.5px" />
    </g>

    <g id="sight" class="merek">
      <circle r="40" cx="50" cy="50" stroke="red" stroke-width="5" fill="none" />
      <circle r="8" cx="50" cy="50" stroke="red" fill="red" />
	  <line x1="50" x2="50" y1="50" y2="10" stroke="red" stroke-width="2"/>
	  <rect x="90" y="45" width="200" height="10" fill="url(#screwPattern)" stroke="red" stroke-width="2px" />
    </g>
  </defs>

  <g transform="translate(200,120)" stroke-width="0.5" fill="none">
    <g transform="scale(1)">  <!-- direktna končna transformacija -->
      <use xlink:href="#target" />
    </g>
  </g>
  
  <g transform="translate(200,360)" stroke-width="0.5" fill="none">
    <g transform="scale(0.75)">  <!-- direktna končna transformacija -->
      <use xlink:href="#target" />
    </g>
  </g>
  
  <g transform="translate(200,600)" stroke-width="0.5" fill="none">
    <g transform="scale(0.5)">  <!-- direktna končna transformacija -->
      <use xlink:href="#target" />
    </g>
  </g>



  <use xlink:href="#sight" id="Sign" transform="translate(210,70)" />
  <use xlink:href="#sight" id="Sign" transform="translate(185,310)" />
  <use xlink:href="#sight" id="Sign" transform="translate(158,550)" />
  
  <text x="350" y="220" font-size="30" font-weight="bold">20m</text>
  <text x="300" y="430" font-size="30" font-weight="bold">30m</text>
  <text x="280" y="650" font-size="30" font-weight="bold">40m</text>

</svg>
