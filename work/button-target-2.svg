<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 20001102//EN" "http://www.w3.org/TR/2000/CR-SVG-20001102/DTD/svg-20001102.dtd">
<svg width="400" height="600" viewBox="100 100 400 600"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
>

  <title>Arrowhead</title>
  <style>
    .merek { cursor: pointer; }
  </style>
<defs>
<pattern id="screwPattern" patternUnits="userSpaceOnUse" width="5" height="20">
    <line x1="0" y1="20" x2="10" y2="0" stroke="silver" stroke-width="2" />
</pattern>
    <g id="target" stroke-width="0.5" fill="none">
      <circle r="100" stroke="black" fill="black" stroke-width="0.5px" />
      <circle r="80" stroke="white" stroke-width="0.5px" />
      <circle r="60" stroke="white" stroke-width="0.5px" />
      <circle r="40" stroke="white" stroke-width="0.5px" />
      <circle r="20" stroke="black" fill="yellow" />
      <circle r="10" stroke="black" fill="none" stroke-width="0.5px" />
      <line x1="-4" y1="0" x2="4" y2="0" stroke="black" stroke-width="0.5px" />
      <line x1="0" y1="-4" x2="0" y2="4" stroke="black" stroke-width="0.5px" />
    </g>

    <g id="sight" stroke="black">
      <circle cx="412" cy="215" r="12" fill="silver"/>
	<rect x="425" y="210" width="115" height="10" fill="url(#screwPattern)" stroke="silver"/>
	<rect x="480" y="200" width="35" height="30" fill="blue" rx="5"/>
<rect x="515" y="200" width="20" height="30" fill="blue" rx="5"/>

<!-- bow -->
<path d="M440,100 v130 a10,10 0 0 1 -10,10 h-70 a10,10 0 0 0 0,20 h100 a10,10 0 0 0 10,-10 v-150 C464,90 451,109 440,100 " fill="blue"/>
<path d="M360 260 C435,290 348,383 396,432 h30 C474,383 387,290 462,260z" fill="silver"/>
<path d="M396,432 v50 C406,490 413,474 426,482 v-50 z"  fill="blue"/>

    </g>

  </defs>

  <rect id="BackDrop" x="-10%" y="-10%" width="110%" height="110%" pointer-events="all" fill="AliceBlue" />

  <g transform="translate(305,265)" stroke-width="0.5" fill="none">
    <g transform="scale(0.35)">  <!-- direktna končna transformacija -->
      <use xlink:href="#target" />
    </g>
  </g>


<g transform="translate(-200,50)" stroke="black">
	<use xlink:href="#sight" id="Sign" />
</g>

<text x="300" y="400" font-size="30" font-weight="bold">30m</text>

</svg>
